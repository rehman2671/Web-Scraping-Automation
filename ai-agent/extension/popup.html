<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Agent</title>
    <link rel="stylesheet" href="ui/styles.css" />
  </head>
  <body class="popup">
    <header>
      <h1>AI Agent</h1>
      <span id="conn-dot" class="dot"></span>
    </header>
    <section>
      <label>Backend</label>
      <input id="backend-url" type="text" />
    </section>
    <section>
      <label>Active project</label>
      <div class="row">
        <select id="project-select"></select>
        <button id="refresh-projects">↻</button>
      </div>
      <div class="row">
        <input id="new-project" placeholder="new project name" />
        <button id="create-project">+</button>
      </div>
    </section>
    <section>
      <label>Goal</label>
      <textarea id="goal" rows="4" placeholder="Describe what you want the agent to build or fix"></textarea>
    </section>
    <section class="row">
      <button id="open-panel">Open IDE Panel</button>
      <button id="start-agent" class="primary">Start</button>
    </section>
    <section class="row">
      <button id="pause-agent">Pause</button>
      <button id="resume-agent">Resume</button>
      <button id="stop-agent" class="danger">Stop</button>
    </section>
    <section>
      <label>State</label>
      <div id="state">IDLE</div>
    </section>
    <script src="popup.js"></script>
  </body>
</html>
